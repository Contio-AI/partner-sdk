name: Sync Webhook Spec

on:
  schedule:
    # Run every weekday at 9am UTC (after typical partner docs deployments)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create PR if changes detected'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-spec:
    name: Check for Webhook Spec Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download latest spec from docs.contio.ai
        run: |
          echo "📥 Downloading webhook spec from official documentation..."
          curl -sf https://docs.contio.ai/partner-api/asyncapi/webhooks.yaml -o /tmp/webhooks-latest.yaml
          
          # Extract version from downloaded spec
          NEW_VERSION=$(grep -E "^[[:space:]]+version:" /tmp/webhooks-latest.yaml | head -1 | sed 's/.*version:[[:space:]]*//')
          OLD_VERSION=$(grep -E "^[[:space:]]+version:" specs/asyncapi/webhooks.yaml | head -1 | sed 's/.*version:[[:space:]]*//')
          
          echo "Current local version: $OLD_VERSION"
          echo "Published version: $NEW_VERSION"
          echo "OLD_VERSION=$OLD_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Check for spec changes
        id: check-changes
        run: |
          if diff -q /tmp/webhooks-latest.yaml specs/asyncapi/webhooks.yaml > /dev/null 2>&1; then
            echo "✅ Webhook spec is up to date"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 Webhook spec has changed!"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # Show what changed
            echo ""
            echo "Changes detected:"
            diff specs/asyncapi/webhooks.yaml /tmp/webhooks-latest.yaml || true
          fi

      - name: Update spec and regenerate types
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "📝 Updating local spec..."
          cp /tmp/webhooks-latest.yaml specs/asyncapi/webhooks.yaml
          
          echo "🔧 Regenerating TypeScript types..."
          npm run gen-webhook-types
          
          echo "🔧 Updating public type exports..."
          node scripts/sync-webhook-exports.js

      - name: Verify build
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "🔨 Verifying build..."
          npm run build
          
          echo "🧪 Running tests..."
          npm test

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true' && (github.event.inputs.create_pr != 'false')
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync webhook types with API v${{ env.NEW_VERSION }}"
          title: "chore: Sync webhook types with Partner API v${{ env.NEW_VERSION }}"
          body: |
            ## Webhook Spec Sync
            
            This PR was automatically generated to sync webhook types with the official Partner API documentation.
            
            **Version Change:** `${{ env.OLD_VERSION }}` → `${{ env.NEW_VERSION }}`
            
            ### Changes
            - Updated `specs/asyncapi/webhooks.yaml` from [docs.contio.ai](https://docs.contio.ai/partner-api/asyncapi/webhooks.yaml)
            - Regenerated `src/generated/webhook-types.ts`
            - Updated `src/webhooks/types.ts` exports
            
            ### Verification
            - ✅ TypeScript build passes
            - ✅ All tests pass
            
            ---
            _This PR was auto-generated by the [sync-webhook-spec](${{ github.server_url }}/${{ github.repository }}/actions/workflows/sync-webhook-spec.yml) workflow._
          branch: auto/sync-webhook-spec-${{ env.NEW_VERSION }}
          delete-branch: true
          labels: |
            automated
            webhooks
            dependencies

